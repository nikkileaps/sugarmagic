<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugarmagic Preview</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #preview-root { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
      /* Story 47.7.5+ — overlay root for the React tree that mounts
         SugarProfile's LoginModal / SignedInBadge above the runtime
         canvas. position:absolute so it doesn't steal layout space;
         pointer-events:none so the underlying canvas still gets
         mouse input EXCEPT where overlay children opt in via
         pointer-events:auto (Mantine modals + buttons do by
         default). */
      #preview-overlay-root {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 20;
      }
      #preview-overlay-root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="preview-root"></div>
    <div id="preview-overlay-root"></div>
    <script type="module" src="/src/preview.tsx"></script>
  </body>
</html>
